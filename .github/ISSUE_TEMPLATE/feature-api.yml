name: "Feature: API / Backend"
description: New endpoint, service, business logic, or .NET work
title: "[API]: "
labels: ["feature", "api"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What needs to be built?
      description: Describe the feature and why it is needed
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] Endpoint returns...\n- [ ] Validates...\n- [ ] Handles error case..."
    validations:
      required: true
  - type: textarea
    id: technical
    attributes:
      label: Technical Notes
      description: Controllers, services, models, migration notes
    validations:
      required: false
  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      description: Fibonacci estimate — auto-syncs to project board
      options: ["1", "2", "3", "5", "8", "13", "21"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Low, Medium, High, Critical]
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Needs DB changes (notify DBA)
        - label: Needs auth / permission changes
        - label: Needs unit tests
