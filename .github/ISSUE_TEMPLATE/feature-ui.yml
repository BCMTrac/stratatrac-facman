name: "Feature: UI / Frontend"
description: New screen, component, or user-facing change
title: "[UI]: "
labels: ["feature", "ui"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What needs to be built?
      description: Describe the UI change and its purpose
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] Screen shows...\n- [ ] Button does...\n- [ ] Validates input..."
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Design / Mockup Notes
      description: Link to mockup or describe the layout
    validations:
      required: false
  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      description: Fibonacci estimate — auto-syncs to project board
      options: ["1", "2", "3", "5", "8", "13", "21"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Low, Medium, High, Critical]
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Needs API changes (create linked API issue)
        - label: Needs mobile / responsive consideration
        - label: Needs accessibility review
