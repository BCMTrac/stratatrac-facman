name: "Feature: Full Stack"
description: Feature spanning both API/backend and UI/frontend
title: "[Feature]: "
labels: ["feature", "api", "ui"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: What is being built and why
    validations:
      required: true
  - type: textarea
    id: api_work
    attributes:
      label: API / Backend Work
      placeholder: "- New endpoint: POST /api/...\n- Service changes...\n- Model changes..."
    validations:
      required: true
  - type: textarea
    id: ui_work
    attributes:
      label: UI / Frontend Work
      placeholder: "- New screen: ...\n- Component changes: ..."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] ...\n- [ ] ..."
    validations:
      required: true
  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      description: Fibonacci estimate — auto-syncs to project board
      options: ["1", "2", "3", "5", "8", "13", "21"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Low, Medium, High, Critical]
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Needs DB changes (notify DBA)
        - label: Needs auth / permission changes
        - label: Has dependent issues (link them)
