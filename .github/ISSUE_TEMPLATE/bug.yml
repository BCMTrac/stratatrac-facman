name: "Bug Fix"
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-broke
    attributes:
      label: What is broken?
      description: Clear description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      description: Fibonacci estimate — auto-syncs to project board
      options: ["1", "2", "3", "5", "8", "13", "21"]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Low, Medium, High, Critical]
    validations:
      required: true
  - type: checkboxes
    id: components
    attributes:
      label: Affected Components
      options:
        - label: API / Backend (.NET)
        - label: UI / Frontend
        - label: Database / SQL
        - label: Server / Infrastructure
        - label: Auth / Security
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Logs, screenshots, environment info
    validations:
      required: false
