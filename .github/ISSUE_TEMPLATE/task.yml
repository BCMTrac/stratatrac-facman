name: Task
description: Technical task, refactor, chore, or investigation
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in the fields below. Story Points and Priority are used by the project board automation.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
      default: 1
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - BCMTrac MVC
        - StraTaTrac
        - Auth / Gateway
        - Statement API
        - Invoice API
        - Email API
        - Other API
        - Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: Story Points
      description: Effort estimate (1 = trivial, 2 = small, 3 = medium, 5 = large, 8 = very large)
      placeholder: "1"
    validations:
      required: true
