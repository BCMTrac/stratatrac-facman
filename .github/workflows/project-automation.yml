name: BCMTrac Project Automation
on:
  issues:
    types: [opened, reopened]
jobs:
  add-to-board:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to BCMTrac project board
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_BOARD_PAT }}
          script: |
            await github.graphql(`
              mutation($p: ID!, $i: ID!) {
                addProjectV2ItemById(input: { projectId: $p, contentId: $i }) {
                  item { id }
                }
              }
            `, {
              p: "PVT_kwDODc8SNM4BQ6v2",
              i: context.payload.issue.node_id
            });
